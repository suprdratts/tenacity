name: OSV-Scanner

# Scans declared dependencies (vcpkg.json, submodules, etc.) against OSV.dev
# and uploads results to the Code Scanning tab alongside CodeQL findings.

on:
  # Weekly full scan — catches newly disclosed CVEs against unchanged deps.
  schedule:
    - cron: '0 5 * * 1'
  # PR-triggered scan — only when dependency manifests change.
  pull_request:
    branches: [ main, 1.3 ]
    paths:
      - '**/vcpkg.json'
      - '**/vcpkg-configuration.json'
      - '.gitmodules'
      - '.github/workflows/osv-scanner.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for SARIF upload to Code Scanning
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # OSV-Scanner walks submodules for manifest files, but we don't need
          # them fully populated — the .gitmodules entry alone is enough.
          submodules: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2
        continue-on-error: true   # keep going so SARIF upload always runs
        with:
          scan-args: |-
            --format=sarif
            --output=osv-scanner-results.sarif
            --recursive
            ./

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-scanner-results.sarif
          category: osv-scanner
