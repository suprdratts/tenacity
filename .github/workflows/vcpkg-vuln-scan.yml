name: vcpkg Vulnerability Scan

# Scans our vcpkg dependencies against OSV.dev via the vcpkg-vuln-scan action.
# Findings show up on the Code Scanning tab alongside CodeQL.

on:
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC
  push:
    branches: [ main, 1.3 ]
    paths:
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.github/workflows/vcpkg-vuln-scan.yml'
  pull_request:
    branches: [ main, 1.3 ]
    paths:
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - '.github/workflows/vcpkg-vuln-scan.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan vcpkg dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for SARIF upload

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # vcpkg submodule is needed so the scanner can read
          # vcpkg/ports/<name>/vcpkg.json for resolved versions.
          submodules: true

      - name: Run vcpkg-vuln-scan
        uses: emabrey/vcpkg-vuln-scan@v1
        id: scan
        with:
          project-root: .
          transitive: true
          sarif: vcpkg-vuln.sarif
          suppressions: .github/vcpkg-suppressions.json
          # Don't fail the workflow on findings; Code Scanning surfaces them
          # and we don't want CVE churn to block unrelated PRs.
          fail-on-findings: false

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: vcpkg-vuln.sarif
          category: vcpkg-vuln-scan
